        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;

        }

        body {
            background: radial-gradient(ellipse at center, #0d1f35 0%, #040c16 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
            box-shadow: 0 0 0 2px rgba(0, 200, 100, 0.15), 0 0 50px rgba(0, 140, 60, 0.2), 0 0 100px rgba(0, 0, 0, 0.95);
        }

        #mobile-overlay {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(800px, 100vw);
            padding: 8px 20px max(16px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 100;
        }

        .mbtn {
            pointer-events: auto;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
            line-height: 1.3;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .mbtn:active {
            transform: scale(0.86);
        }

        #sim-btn {
            width: 72px;
            height: 72px;
            font-size: 12px;
            background: radial-gradient(circle at 40% 35%, #4466aa, #1a2a44);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.7), 0 0 14px rgba(68, 100, 200, 0.4);
            border: 2px solid rgba(100, 150, 255, 0.7);
        }

        #swing-btn {
            width: 96px;
            height: 96px;
            font-size: 16px;
            background: radial-gradient(circle at 40% 35%, #ff9922, #cc4400);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.7), 0 0 22px rgba(255, 120, 0, 0.55);
            border: 3px solid rgba(255, 210, 80, 0.9);
        }

        #change-btn {
            width: 72px;
            height: 72px;
            font-size: 12px;
            background: radial-gradient(circle at 40% 35%, #338844, #115522);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.7), 0 0 14px rgba(50, 200, 80, 0.4);
            border: 2px solid rgba(80, 220, 100, 0.7);
        }

        #steal-btn {
            width: 72px;
            height: 72px;
            font-size: 12px;
            background: radial-gradient(circle at 40% 35%, #aa6600, #552200);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.7), 0 0 14px rgba(200, 120, 0, 0.4);
            border: 2px solid rgba(255, 180, 60, 0.7);
        }

        .mbtn.show {
            display: flex;
        }
    </style>

        function throwBall(controlPower) {
            const pitcher = getPitcher();
            const pitcherSide = G.half === 0 ? 1 : 0;
            G.pitchCounts[pitcherSide]++;
            SFX.pitch();

            const pitchObj = pitcher.pitches[G.pitchChoice];
            const pDef = PITCH_DICT[pitchObj.id];
            const speedMult = 0.7 + controlPower * 0.6;
            const good = controlPower >= 0.60 && controlPower <= 0.90;
            const over = controlPower > 0.90;

            const fatigueMod = Math.max(0, (G.pitchCounts[pitcherSide] - pitcher.stm * 0.6) / (pitcher.stm * 0.4));
            const cMod = (100 - pitcher.ctrl) / 20 * (1 + fatigueMod * 0.8);
            let devX = 0, devY = 0;
            if (over) { devX = rnd(-15, 15) * cMod; devY = rnd(5, 15) * cMod; }
            else if (good) { devX = rnd(-3, 3) * cMod; devY = rnd(-3, 3) * cMod; }
            else { devX = rnd(-10, 10) * cMod; devY = rnd(-6, 10) * cMod; }

            G.ballActive = true; G.ballFrame = G.frame;
            const baseMph = pDef.mph + (pitcher.vel - 90) / 2;
            G.ballDur = Math.round((50 - (baseMph - 80) * 0.3) / speedMult);

            G.ballSX = W / 2; G.ballSY = 230;
            G.ballEX = SZcx + G.aimX * (SZw / 2) + devX; G.ballEY = SZcy + G.aimY * (SZh / 2) + devY;

            const breakMult = pitchObj.lv * 0.45;
            G.ballCX = pDef.bx * breakMult; G.ballCY = pDef.by * breakMult;

            G._actualAimX = (G.ballEX - SZcx) / (SZw / 2);
            G._actualAimY = (G.ballEY - SZcy) / (SZh / 2);

            if (!playerBatting()) {
                const batter = getBatter();
                const inZone = Math.abs(G._actualAimX) <= 1 && Math.abs(G._actualAimY) <= 1;
                const aiSwingMult = [0.45, 1.0, 1.45][G.difficulty];
                const aiErrMult = [2.2, 1.0, 0.45][G.difficulty];
                G.aiSwing = Math.random() < (inZone ? (0.50 + batter.con / 200) * aiSwingMult : 0.12 * aiSwingMult);
                G.aiCX = G._actualAimX + rnd(-0.3, 0.3) * (100 - batter.con) / 30 * aiErrMult;
                G.aiCY = G._actualAimY + rnd(-0.3, 0.3) * (100 - batter.con) / 30 * aiErrMult;
                G.aiSwingFrame = G.ballFrame + G.ballDur + rndI(-8, 8);
                G.phase = PH.BALL_FLIGHT;
            } else {
                G.phase = PH.BATTING; G.phPos = 0; G.phPressed = false; G.phDone = false; G.phValue = 0;
                const phMult = [0.55, 0.80, 1.20][G.difficulty];
                G.phSpeed = (0.008 + speedMult * 0.005) * phMult;

        function resolveSwing(phVal, cx, cy) {

            const batter = getBatter();
            const contactDist = Math.sqrt(Math.pow(cx - G._actualAimX, 2) + Math.pow(cy - G._actualAimY, 2));
            const contactScore = clamp(1 - contactDist / (1.3 + (batter.con / 100) * 0.9), 0, 1);
            const qualAdj = playerBatting() ? [0.20, 0, -0.20][G.difficulty] : [-0.20, 0, 0.20][G.difficulty];
            const quality = clamp(timingScore * 0.55 + contactScore * 0.45 + qualAdj, 0, 1);

            let type;
            if (quality > 0.78) {
                const hrChance = (batter.pow - 50) / 80;
                type = Math.random() < hrChance ? 'HR' : (Math.random() < 0.5 ? '2B' : '1B');
            } else if (quality > 0.55) {
                type = Math.random() < 0.72 ? '1B' : 'OUT';
            } else if (quality > 0.32) {
                type = Math.random() < 0.42 ? '1B' : 'OUT';
            } else if (quality > 0.14) {
                type = Math.random() < 0.18 ? '1B' : 'OUT';
            } else {
                type = 'K';
            }

            if (type === 'HR' || type === '1B' || type === '2B') {
                G.hitEffectFrame = G.frame;
                G.hitType = type;
                G.hitFlyDir = (Math.random() < 0.5 ? 1 : -1) * (0.6 + Math.random() * 0.8);
            }

            applyPlay(type);
        }

        function attemptSteal() {
            if (!playerBatting() || G.phase !== PH.WAIT_PITCH) return;
            let from = -1;
            if (G.runners[1]) from = 1;
            else if (G.runners[0]) from = 0;
            if (from === -1) return;

            const bat = G.half;
            const batterSpd = getBatter().spd;
            const successChance = clamp(0.25 + (batterSpd - 50) / 100, 0.20, 0.72);
            const success = Math.random() < successChance;

            if (success) {
                if (from === 1) { G.runners[2] = true; G.runners[1] = false; }
                else { G.runners[1] = true; G.runners[0] = false; }
                SFX.steal_ok();
                showRes('盜壘成功！', 'STOLEN BASE', '#FFD700', false);
                G._continueAtBat = true;
            } else {
                G.outs++;
                const endHalf = G.outs >= 3;
                if (from === 1) G.runners[1] = false;
                else G.runners[0] = false;
                SFX.steal_fail();
                showRes('盜壘失敗', 'CAUGHT STEALING', '#FF4444', endHalf);
            }
        }

        function resolveNoSwing() {
            const inZone = Math.abs(G._actualAimX) <= 1 && Math.abs(G._actualAimY) <= 1;
            if (inZone) {
                G.strikes++;
                SFX.strike();
                if (G.strikes >= 3) { applyPlay('K'); } else { showRes('好球！', 'STRIKE', '#FF8844', false); G._continueAtBat = true; }
            } else {
                G.balls++;
                SFX.ball();
                if (G.balls >= 4) { applyPlay('BB'); } else { showRes('壞球', 'BALL', '#4488FF', false); G._continueAtBat = true; }
            }
        }

        function applyPlay(type) {
            G._continueAtBat = false; const bat = G.half;
            let text = '', sub = '', col = '#fff', endHalf = false;
            const slotIdx = G.batOrder[bat];
            const st = G.batStats[bat][slotIdx];
            if (type === 'HR') {
                const runs = 1 + G.runners.filter(r => r).length;
                G.score[bat] += runs; G.runners = [false, false, false];
                text = '全壘打！'; sub = 'HOMERUN'; col = '#FFD700';
                SFX.homerun();
                st.ab++; st.h++; st.hr++; st.rbi += runs;
            } else if (type === '2B') {
                const rbi = (G.runners[2] ? 1 : 0) + (G.runners[1] ? 1 : 0);
                if (G.runners[2]) G.score[bat]++; if (G.runners[1]) G.score[bat]++;
                G.runners = [false, true, G.runners[0] && Math.random() < 0.5]; text = '二壘安打！'; sub = '2 BASE HIT'; col = '#44FF88';
                SFX.crack();
                st.ab++; st.h++; st.rbi += rbi;
            } else if (type === '1B') {
                const rbi = G.runners[2] ? 1 : 0;
                if (G.runners[2]) G.score[bat]++;
                const r2 = G.runners[1] && Math.random() < 0.5; const r1 = G.runners[0];
                G.runners = [true, r1, r2]; text = '安打！'; sub = 'HIT'; col = '#44FF88';
                SFX.crack();
                st.ab++; st.h++; st.rbi += rbi;
            } else if (type === 'BB') {
                const rbi = (G.runners[0] && G.runners[1] && G.runners[2]) ? 1 : 0;
                if (G.runners[0] && G.runners[1] && G.runners[2]) G.score[bat]++;
                if (G.runners[0] && G.runners[1]) G.runners[2] = true;
                if (G.runners[0]) G.runners[1] = true;
                G.runners[0] = true; text = '四壞球保送！'; sub = 'WALK'; col = '#4488FF';
                SFX.ball();
                st.bb++; st.rbi += rbi;
            } else if (type === 'OUT') {
                G.outs++; text = '出局！'; sub = 'OUT'; col = '#FF6644'; if (G.outs >= 3) endHalf = true;
                SFX.out();
                st.ab++;
            } else if (type === 'K') {
                G.outs++; text = '三振出局！'; sub = 'STRIKEOUT'; col = '#FF4444'; if (G.outs >= 3) endHalf = true;
                SFX.out();
                st.ab++; st.k++;
            }
            if (type !== 'BB' && !G._continueAtBat) G.batOrder[G.half] = (G.batOrder[G.half] + 1) % 9;
            showRes(text, sub, col, endHalf);
        }

        function showRes(text, sub, col, endHalf) {
            G.phase = PH.RESULT; G.resText = text; G.resSub = sub; G.resCol = col;
            G.resTimer = 95; G.resEndHalf = endHalf;
        }

        function endHalf() {
            const p0 = G.innScores[0].reduce((a, b) => a + b, 0), p1 = G.innScores[1].reduce((a, b) => a + b, 0);
            if (G.half === 0) G.innScores[0].push(G.score[0] - p0); else G.innScores[1].push(G.score[1] - p1);
            if (G.inning >= 9 && G.half === 1 && G.score[1] > G.score[0]) { G.scr = SCR.OVER; return; }
            G.scr = SCR.HALF_END; G.halfEndTimer = 0;
        }

        function _doNextHalf() {
            G.half++; if (G.half > 1) { G.half = 0; G.inning++; }
            if (G.inning > 9) { G.scr = SCR.OVER; return; }
            G.runners = [false, false, false]; G.outs = 0; G.balls = 0; G.strikes = 0;
            G.scr = SCR.GAME; G.phase = PH.INNING_START; G.phaseTimer = 100;
        }

        function simAtBat(batter, pitcher) {
            const diffPitchAdj = [0.7, 1.0, 1.3][G.difficulty];
            const ctrl = clamp(pitcher.ctrl / 100 * diffPitchAdj, 0.3, 1.0);
            const vel = clamp(pitcher.vel / 100 * diffPitchAdj, 0.5, 1.0);
            const con = batter.con / 100;
            const pow = batter.pow / 100;
            const kProb = clamp(0.28 * ctrl - 0.08 * con, 0.06, 0.45);
            const bbProb = clamp(0.12 - 0.09 * ctrl, 0.02, 0.14);
            const hrProb = clamp(0.06 * pow - 0.02 * vel, 0.01, 0.14);
            const hitProb = clamp(0.22 * con - 0.06 * vel, 0.05, 0.28);
            const r = Math.random();
            if (r < kProb) return 'K';
            if (r < kProb + bbProb) return 'BB';
            if (r < kProb + bbProb + hrProb) return 'HR';
            if (r < kProb + bbProb + hrProb + hitProb * 0.28) return '2B';
            if (r < kProb + bbProb + hrProb + hitProb) return '1B';
            return 'OUT';
        }

        function simulateHalf() {
            const pitcher = getPitcher();
            let outs = G.outs, runners = [...G.runners], score = 0, atBats = 0;
            while (outs < 3 && atBats < 27) {
                const batIdx = (G.batOrder[G.half] + atBats) % 9;
                const result = simAtBat(batTeamInfo().roster.batters[G.lineups[G.half][batIdx]], pitcher);
                const st = G.batStats[G.half][batIdx];
                atBats++;
                if (result === 'K') {
                    outs++; st.ab++; st.k++;
                } else if (result === 'OUT') {
                    outs++; st.ab++;
                } else if (result === 'BB') {
                    const rbi = (runners[0] && runners[1] && runners[2]) ? 1 : 0;
                    if (runners[0] && runners[1] && runners[2]) score++;
                    if (runners[0] && runners[1]) runners[2] = true;
                    if (runners[0]) runners[1] = true;
                    runners[0] = true;
                    st.bb++; st.rbi += rbi;
                } else if (result === '1B') {
                    const rbi = runners[2] ? 1 : 0;
                    if (runners[2]) score++;
                    const r2 = runners[1] && Math.random() < 0.5; const r1 = runners[0];
                    runners = [true, r1, r2];
                    st.ab++; st.h++; st.rbi += rbi;
                } else if (result === '2B') {
                    const rbi = (runners[2] ? 1 : 0) + (runners[1] ? 1 : 0);
                    if (runners[2]) score++; if (runners[1]) score++;
                    runners = [false, true, runners[0] && Math.random() < 0.5];
                    st.ab++; st.h++; st.rbi += rbi;
                } else if (result === 'HR') {
                    const runs = 1 + runners.filter(r => r).length;
                    score += runs; runners = [false, false, false];
                    st.ab++; st.h++; st.hr++; st.rbi += runs;
                }
            }
            G.score[G.half] += score;
            G.runners = runners;
            G.outs = 3;
            G.batOrder[G.half] = (G.batOrder[G.half] + atBats) % 9;
            const scoreText = score > 0 ? `得 ${score} 分！` : '零封！';
            showRes(`自動模擬 ${G.inning}局${G.half === 0 ? '上' : '下'}`, scoreText, score > 0 ? '#44FF88' : '#AAAAAA', true);
        }

        function update() {
            G.frame++;
            if (G.scr === SCR.TITLE) { if (actionTrigger()) { G.scr = SCR.SELECT; G.selStep = 0; G.cursor = 0; } clearInput(); return; }

            if (G.scr === SCR.SELECT) {
                if (isMouseJustPressed) {
                    if (G.selStep <= 1) {
                        const layout = teamBtnLayout();
                        layout.forEach(({ x, y, w, h }, i) => {
                            if (mouseX >= x && mouseX <= x + w && mouseY >= y && mouseY <= y + h) {
                                G.cursor = i;
                                if (G.selStep === 0) { G.awayIdx = G.cursor; G.selStep = 1; G.cursor = (G.cursor + 1) % TEAMS.length; }
                                else if (G.cursor !== G.awayIdx) { G.homeIdx = G.cursor; G.selStep = 2; }
                            }
                        });
                    } else if (G.selStep === 2) {
                        const diffs = ['簡單', '普通', '困難'];
                        diffs.forEach((_, di) => {
                            const bx = W / 2 - 195 + di * 135, by = 400;
                            if (mouseX >= bx && mouseX <= bx + 120 && mouseY >= by && mouseY <= by + 70) {
                                G.difficulty = di;
                                G.inning = 1; G.half = 0; G.outs = 0; G.balls = 0; G.strikes = 0; G.score = [0, 0]; G.batOrder = [0, 0];
                                G.lineups = [[0, 1, 2, 3, 4, 5, 6, 7, 8], [0, 1, 2, 3, 4, 5, 6, 7, 8]];
                                G.pitchers = [0, 0];
                                G.usedBatters = [Array(TEAMS[G.awayIdx].roster.batters.length).fill(false), Array(TEAMS[G.homeIdx].roster.batters.length).fill(false)];
                                G.usedPitchers = [Array(TEAMS[G.awayIdx].roster.pitchers.length).fill(false), Array(TEAMS[G.homeIdx].roster.pitchers.length).fill(false)];

                                for (let i = 0; i < 9; i++) { G.usedBatters[0][i] = true; G.usedBatters[1][i] = true; }
                                G.usedPitchers[0][0] = true; G.usedPitchers[1][0] = true;

                                G.scr = SCR.LINEUP; G.introTimer = 0; G.ballActive = false;
                            }
                        });
                    }
                }
                clearInput(); return;
            }

            if (G.scr === SCR.LINEUP) {
                G.introTimer++;
                if (actionTrigger() || G.introTimer > 300) {
                    G.scr = SCR.GAME; G.phase = PH.INNING_START; G.phaseTimer = 60;
                }
                clearInput(); return;
            }

            if (G.scr === SCR.OVER) { if (actionTrigger()) initState(); clearInput(); return; }

            if (G.scr === SCR.HALF_END) {
                G.halfEndTimer++;
                if (G.halfEndTimer > 30 && actionTrigger()) { _doNextHalf(); }
                clearInput(); return;
            }

            if (isMouseJustPressed && G.scr === SCR.GAME) {
                const qx = W - 115, qy = 15, qw = 100, qh = 40;
                if (mouseX >= qx && mouseX <= qx + qw && mouseY >= qy && mouseY <= qy + qh) {
                    if (confirm('確定要結束比賽，返回主畫面嗎？')) {
                        initState(); clearInput(); return;
                    } else {
                        isMouseJustPressed = false;
                    }
                }
            }

            switch (G.phase) {
                case PH.SUB_MENU:
                    if (isMouseJustPressed) {
                        const layout = getSubMenuLayout();
                        const { isPitcher, sideIdx, availIndices, panelW, panelH, px, py } = layout;
                        const cHover = mouseX >= px + 120 && mouseX <= px + 320 && mouseY >= py + panelH - 60 && mouseY <= py + panelH - 20;
                        if (cHover) { G.phase = G.prevPhase; break; }

                        let drawY = py + 70;
                        for (let i = 0; i < availIndices.length; i++) {
                            const rIdx = availIndices[i];
                            if (mouseX >= px + 20 && mouseX <= px + panelW - 20 && mouseY >= drawY && mouseY <= drawY + 50) {
                                if (isPitcher) { G.pitchers[sideIdx] = rIdx; G.usedPitchers[sideIdx][rIdx] = true; }
                                else { let curOrder = G.batOrder[sideIdx]; G.lineups[sideIdx][curOrder] = rIdx; G.usedBatters[sideIdx][rIdx] = true; }
                                G.phase = G.prevPhase; break;
                            }
                            drawY += 60;
                        }
                    }
                    break;
                case PH.INNING_START:
                    G.phaseTimer--; if (G.phaseTimer <= 0) startAtBat(); break;
                case PH.PITCH_SELECT: {
                    const pitcher = getPitcher(); const cx = W / 2, cy = 160;
                    const dx = mouseX - cx, dy = mouseY - cy; const dist = Math.sqrt(dx * dx + dy * dy);
                    let hovered = -1;
                    if (dist < 120) {
                        if (dist < 25) { hovered = pitcher.pitches.findIndex(p => PITCH_DICT[p.id].dir === 'center'); }
                        else {
                            let mouseAngle = Math.atan2(dy, dx); let minDist = 999;
                            pitcher.pitches.forEach((p, i) => {
                                const pd = PITCH_DICT[p.id];
                                if (pd.dir !== 'center') {
                                    let adist = Math.abs(mouseAngle - pd.dir);
                                    if (adist > Math.PI) adist = Math.PI * 2 - adist;
                                    if (adist < Math.PI / 4 && adist < minDist) { minDist = adist; hovered = i; }
                                }
                            });
                        }
                    }
                    G.hoveredPitchChoice = hovered;
                    if (isMouseJustPressed && !playerBatting()) {
                        const sbx = 10, sby = H - 50;
                        if (mouseX >= sbx && mouseX <= sbx + 120 && mouseY >= sby && mouseY <= sby + 38) { simulateHalf(); break; }
                        const pbx = W - 130, pby = H - 50;
                        if (mouseX >= pbx && mouseX <= pbx + 120 && mouseY >= pby && mouseY <= pby + 38) { G.subType = 'P'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; break; }
                        if (hovered !== -1) { G.pitchChoice = hovered; G.phase = PH.AIM; G.aimState = 0; break; }
                    }
                    break;
                }
                case PH.AIM: {
                    if (G.aimState === 0) { if (isMouseJustPressed) G.aimState = 1; }
                    if (G.aimState === 1) {
                        G.aimX = clamp((mouseX - SZcx) / (SZw / 2), -1.3, 1.3);
                        G.aimY = clamp((mouseY - SZcy) / (SZh / 2), -1.3, 1.3);
                        if (isMouseJustReleased) { G.phase = PH.POWER_GAUGE; G.gaugePos = 0; G.gaugeDir = 1; }
                    }
                    break;
                }
                case PH.POWER_GAUGE:
                    G.gaugePos += G.gaugeDir * 0.025;
                    if (G.gaugePos >= 1) { G.gaugePos = 1; G.gaugeDir = -1; }
                    if (G.gaugePos <= 0) { G.gaugePos = 0; G.gaugeDir = 1; }
                    if (actionTrigger()) { G.gaugePower = G.gaugePos; throwBall(G.gaugePower); }
                    break;
                case PH.WAIT_PITCH: {
                    if (isMobile) {
                        if (G.isDraggingBat) { const sens = 0.008; G.curX = clamp(G.baseCurX + (mouseX - G.dragStartX) * sens, -1.5, 1.5); G.curY = clamp(G.baseCurY + (mouseY - G.dragStartY) * sens, -1.5, 1.5); }
                    } else {
                        G.curX = clamp((mouseX - SZcx) / (SZw / 2), -1.5, 1.5); G.curY = clamp((mouseY - SZcy) / (SZh / 2), -1.5, 1.5);
                    }
                    G.readyPulse = (G.readyPulse + 0.08) % (Math.PI * 2);
                    if (playerBatting() && J('KeyS') && (G.runners[0] || G.runners[1])) { attemptSteal(); break; }
                    if (playerBatting() && isMouseJustPressed) {
                        const bbx = W - 130, bby = H - 50;
                        if (mouseX >= bbx && mouseX <= bbx + 120 && mouseY >= bby && mouseY <= bby + 38) { G.subType = 'B'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; break; }
                        const stx = W - 130, sty = H - 100;
                        if ((G.runners[0] || G.runners[1]) && mouseX >= stx && mouseX <= stx + 120 && mouseY >= sty && mouseY <= sty + 38) { attemptSteal(); break; }
                    }
                    if (mouseY < H - 80 || !playerBatting()) { G.phaseTimer--; }
                    if (G.phaseTimer <= 0) {
                        G.pitchChoice = rndI(0, getPitcher().pitches.length - 1);
                        G.aimX = rnd(-0.82, 0.82); G.aimY = rnd(-0.82, 0.82); G._actualAimX = G.aimX; G._actualAimY = G.aimY;
                        throwBall(0.72 + rnd(-0.08, 0.08));
                    }
                    break;
                }
                case PH.BALL_FLIGHT: {
                    const prog = ballProgress();
                    if (G.aiSwing && G.frame >= G.aiSwingFrame) resolveSwing(0.50 + rnd(-0.12, 0.12), G.aiCX, G.aiCY);
                    else if (prog >= 1) resolveNoSwing();
                    break;
                }
                case PH.BATTING: {
                    if (isMobile) {
                        if (G.isDraggingBat) { const sens = 0.008; G.curX = clamp(G.baseCurX + (mouseX - G.dragStartX) * sens, -1.5, 1.5); G.curY = clamp(G.baseCurY + (mouseY - G.dragStartY) * sens, -1.5, 1.5); }
                    } else { G.curX = clamp((mouseX - SZcx) / (SZw / 2), -1.5, 1.5); G.curY = clamp((mouseY - SZcy) / (SZh / 2), -1.5, 1.5); }
                    const prog = ballProgress();
                    if (prog > 0.15 && !G.phDone) { G.phPos += G.phSpeed; if (G.phPos >= 1) { G.phPos = 1; G.phDone = true; } }
                    if (actionTrigger() && !G.phPressed) { G.phPressed = true; G.phValue = G.phPos; resolveSwing(G.phValue, G.curX, G.curY); }
                    else if (G.phDone && !G.phPressed) resolveNoSwing();
                    break;
                }
                case PH.RESULT:
                    G.resTimer--;
                    if (G.resTimer <= 0) { if (G.resEndHalf) endHalf(); else if (G._continueAtBat) { G._continueAtBat = false; startAtBat(true); } else startAtBat(); }
                    break;
            }
            clearInput();
        }

        // ==========================================
        // UI AND DRAWING UTILITIES

        function render() {
            ctx.clearRect(0, 0, W, H);
            if (G.scr === SCR.TITLE) renderTitle();
            else if (G.scr === SCR.SELECT) renderSelect();
            else if (G.scr === SCR.LINEUP) renderLineup();
            else if (G.scr === SCR.GAME) renderGame();
            else if (G.scr === SCR.OVER) renderOver();
            else if (G.scr === SCR.HALF_END) renderHalfEnd();
            if (isMobile && window.innerHeight > window.innerWidth * 1.2) {
                ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(0, 0, W, H);
                ctx.save(); ctx.translate(W / 2, H / 2); txt('📱→📺', W / 2, 0, 52, '#FFD700', 'center', '', false); ctx.restore();
                txt('請橫向使用手機', W / 2, H / 2 + 60, 26, '#FFFFFF');
                txt('ROTATE DEVICE FOR BEST EXPERIENCE', W / 2, H / 2 + 95, 14, 'rgba(180,200,255,0.7)');
            }
        }

        function jerseyStripe(team) {
            const j = team.jersey || '#FFFFFF';
            const r = parseInt(j.slice(1, 3), 16), g = parseInt(j.slice(3, 5), 16), b = parseInt(j.slice(5, 7), 16);
            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return lum > 0.85 ? team.c1 : (team.c2 || '#FFFFFF');
        }

        function hatLogoColor(team) {
            const c = team.c1 || '#000000';
            const r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5 ? '#000000' : '#FFFFFF';
        }

        function drawFace(ctx, name, isSide = false, headY = 0) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            const eIdx = Math.abs(hash) % 4;
            const mIdx = Math.abs(hash >> 2) % 3;

            ctx.fillStyle = '#000'; ctx.strokeStyle = '#000';
            const ex = isSide ? 8 : 0;
            const ey = headY - 2;

            ctx.save(); ctx.translate(ex, ey);
            if (eIdx === 0) { // normal
                ctx.beginPath(); ctx.ellipse(-9, 0, 3.5, 6, 0, 0, Math.PI * 2); ctx.fill();
                if (!isSide) { ctx.beginPath(); ctx.ellipse(9, 0, 3.5, 6, 0, 0, Math.PI * 2); ctx.fill(); }
                else { ctx.beginPath(); ctx.ellipse(9, 0, 2, 5, 0, 0, Math.PI * 2); ctx.fill(); }
            } else if (eIdx === 1) { // angry
                ctx.beginPath(); ctx.ellipse(-9, 0, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-14, -6); ctx.lineTo(-5, -3); ctx.stroke();
                if (!isSide) {
                    ctx.beginPath(); ctx.ellipse(9, 0, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(14, -6); ctx.lineTo(5, -3); ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.ellipse(9, 0, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(13, -5); ctx.lineTo(6, -3); ctx.stroke();
                }
            } else if (eIdx === 2) { // closed
                ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(-5, 0); ctx.stroke();
                if (!isSide) { ctx.beginPath(); ctx.moveTo(13, 0); ctx.lineTo(5, 0); ctx.stroke(); }
                else { ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(5, 0); ctx.stroke(); }
            } else { // dots
                ctx.beginPath(); ctx.arc(-9, 0, 2.5, 0, Math.PI * 2); ctx.fill();

                } else if (!playerBatting() && G.phase === PH.PITCH_SELECT) {
                    btnS.classList.remove('show'); btnC.classList.add('show'); btnA.classList.add('show'); btnSt.classList.remove('show');
                } else { btnS.classList.remove('show'); btnC.classList.remove('show'); btnA.classList.remove('show'); btnSt.classList.remove('show'); }
            } else { btnS.classList.remove('show'); btnC.classList.remove('show'); btnA.classList.remove('show'); btnSt.classList.remove('show'); }
            requestAnimationFrame(loop);
        }
        loop();

        // Mobile Events
        document.getElementById('swing-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            if (G.scr === SCR.GAME && playerBatting() && G.phase === PH.BATTING && G.phDone && !G.phPressed) {
                G.phPressed = true; G.phValue = G.phPos; resolveSwing(G.phValue, G.curX, G.curY);
            }
        }, { passive: false });
        document.getElementById('swing-btn').addEventListener('mousedown', e => {
            e.preventDefault();
            if (G.scr === SCR.GAME && playerBatting() && G.phase === PH.BATTING && G.phDone && !G.phPressed) {
                G.phPressed = true; G.phValue = G.phPos; resolveSwing(G.phValue, G.curX, G.curY);
            }
        });
        document.getElementById('sim-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            if (G.scr === SCR.GAME && !playerBatting() && G.phase === PH.PITCH_SELECT) simulateHalf();
        }, { passive: false });
        document.getElementById('sim-btn').addEventListener('mousedown', e => {
            e.preventDefault();
            if (G.scr === SCR.GAME && !playerBatting() && G.phase === PH.PITCH_SELECT) simulateHalf();
        });
        document.getElementById('change-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            if (G.scr !== SCR.GAME) return;
            if (!playerBatting() && G.phase === PH.PITCH_SELECT) { G.subType = 'P'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; }
            else if (playerBatting() && G.phase === PH.WAIT_PITCH) { G.subType = 'B'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; }
        }, { passive: false });
        document.getElementById('change-btn').addEventListener('mousedown', e => {
            e.preventDefault();
            if (G.scr !== SCR.GAME) return;
            if (!playerBatting() && G.phase === PH.PITCH_SELECT) { G.subType = 'P'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; }
            else if (playerBatting() && G.phase === PH.WAIT_PITCH) { G.subType = 'B'; G.prevPhase = G.phase; G.phase = PH.SUB_MENU; }
        });
        document.getElementById('steal-btn').addEventListener('touchstart', e => {
            e.preventDefault(); attemptSteal();
        }, { passive: false });
        document.getElementById('steal-btn').addEventListener('mousedown', e => {
            e.preventDefault(); attemptSteal();
        });
    </script>
</body>

</html>
